<div x-show="page==='market'">
  <div class="search-bar">
    <input class="form-input" type="search" placeholder="Filter coins…" x-model="coinSearch" />
    <button class="btn btn-primary" @click="loadMarket()">Refresh</button>
  </div>

  <div class="load-center-row" x-show="loadingMarket">
    <div class="spinner spinner-lg"></div>
  </div>

  <div class="card" x-show="!loadingMarket">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Coin</th>
            <th>Price</th>
            <th>24h Change</th>
            <th>Market Cap</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(coin, i) in filteredCoins" :key="coin.id">
            <tr class="cursor-pointer" @click="page='charts'; $nextTick(() => renderPriceChart(coin.coingecko_id))">
              <td class="text-muted" x-text="i+1"></td>
              <td>
                <div class="coin-cell">
                  <img class="coin-img" :src="coin.image_url" :alt="coin.name" x-show="coin.image_url" />
                  <div>
                    <div class="coin-name" x-text="coin.name"></div>
                    <div class="coin-symbol" x-text="coin.symbol?.toUpperCase()"></div>
                  </div>
                </div>
              </td>
              <td x-text="fmtUSD(coin.current_price_usd)"></td>
              <td>
                <span class="badge" :class="(coin.price_change_24h ?? 0) >= 0 ? 'badge-green' : 'badge-red'" x-text="fmtPct(coin.price_change_24h)"></span>
              </td>
              <td x-text="coin.market_cap ? '$' + (coin.market_cap/1e9).toFixed(2) + 'B' : '—'"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div><!-- /market -->
