<canvas id="neural-bg-canvas"></canvas>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const colorPalettes = [
  [new THREE.Color(0x667eea),new THREE.Color(0x764ba2),new THREE.Color(0xf093fb),new THREE.Color(0x9d50bb),new THREE.Color(0x6e48aa)],
  [new THREE.Color(0xf857a6),new THREE.Color(0xff5858),new THREE.Color(0xfeca57),new THREE.Color(0xff6348),new THREE.Color(0xff9068)],
  [new THREE.Color(0x4facfe),new THREE.Color(0x00f2fe),new THREE.Color(0x43e97b),new THREE.Color(0x38f9d7),new THREE.Color(0x4484ce)],
];
const activePalette = 0;
let currentFormation = 0;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.002);
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 28);

const canvasEl = document.getElementById('neural-bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ── Starfield ─────────────────────────────────────────────────────────────────
function createStarfield() {
  const count = 8000, positions = [], colors = [], sizes = [];
  for (let i = 0; i < count; i++) {
    const r = THREE.MathUtils.randFloat(50, 150);
    const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
    const theta = THREE.MathUtils.randFloat(0, Math.PI * 2);
    positions.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
    const c = Math.random();
    colors.push(...(c < 0.7 ? [1,1,1] : c < 0.85 ? [0.7,0.8,1] : [1,0.9,0.8]));
    sizes.push(THREE.MathUtils.randFloat(0.1, 0.3));
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
  geo.setAttribute('size',     new THREE.Float32BufferAttribute(sizes, 1));
  return new THREE.Points(geo, new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `attribute float size;attribute vec3 color;varying vec3 vColor;uniform float uTime;
      void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.0);
      float t=sin(uTime*2.0+position.x*100.0)*0.3+0.7;
      gl_PointSize=size*t*(300.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader: `varying vec3 vColor;void main(){vec2 c=gl_PointCoord-0.5;float d=length(c);
      if(d>0.5)discard;float a=1.0-smoothstep(0.0,0.5,d);gl_FragColor=vec4(vColor,a*0.8);}`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  }));
}
const starField = createStarfield();
scene.add(starField);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.6;
controls.minDistance = 8;
controls.maxDistance = 80;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.2;
controls.enablePan = false;
controls.enableZoom = false;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.6, 0.7));
composer.addPass(new OutputPass());

const pulseUniforms = {
  uTime: { value: 0 },
  uPulsePositions: { value: [new THREE.Vector3(1e3,1e3,1e3), new THREE.Vector3(1e3,1e3,1e3), new THREE.Vector3(1e3,1e3,1e3)] },
  uPulseTimes:     { value: [-1e3, -1e3, -1e3] },
  uPulseColors:    { value: [new THREE.Color(1,1,1), new THREE.Color(1,1,1), new THREE.Color(1,1,1)] },
  uPulseSpeed:     { value: 18.0 },
  uBaseNodeSize:   { value: 0.6 },
};

const noiseFn = `
  vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
  float snoise(vec3 v){
    const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
    vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
    vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
    float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.0*floor(p*ns.z*ns.z);
    vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
    vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
    vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
    return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }`;

const nodeVert = `${noiseFn}
  attribute float nodeSize;attribute float nodeType;attribute vec3 nodeColor;attribute float distanceFromRoot;
  uniform float uTime;uniform vec3 uPulsePositions[3];uniform float uPulseTimes[3];uniform float uPulseSpeed;uniform float uBaseNodeSize;
  varying vec3 vColor;varying float vNodeType;varying vec3 vPosition;varying float vPulseIntensity;varying float vDistanceFromRoot;varying float vGlow;
  float getPulse(vec3 wp,vec3 pp,float pt){
    if(pt<0.0)return 0.0;float ts=uTime-pt;if(ts<0.0||ts>4.0)return 0.0;
    float pr=ts*uPulseSpeed;float d=distance(wp,pp);
    return smoothstep(3.0,0.0,abs(d-pr))*smoothstep(4.0,0.0,ts);
  }
  void main(){
    vNodeType=nodeType;vColor=nodeColor;vDistanceFromRoot=distanceFromRoot;
    vec3 wp=(modelMatrix*vec4(position,1.0)).xyz;vPosition=wp;
    float pi=0.0;for(int i=0;i<3;i++)pi+=getPulse(wp,uPulsePositions[i],uPulseTimes[i]);
    vPulseIntensity=min(pi,1.0);
    float breathe=sin(uTime*0.7+distanceFromRoot*0.15)*0.15+0.85;
    float sz=nodeSize*breathe*(1.0+vPulseIntensity*2.5);
    vGlow=0.5+0.5*sin(uTime*0.5+distanceFromRoot*0.2);
    vec3 mp=position;if(nodeType>0.5){float n=snoise(position*0.08+uTime*0.08);mp+=normal*n*0.15;}
    vec4 mv=modelViewMatrix*vec4(mp,1.0);
    gl_PointSize=sz*uBaseNodeSize*(1000.0/-mv.z);gl_Position=projectionMatrix*mv;
  }`;

const nodeFrag = `
  uniform float uTime;uniform vec3 uPulseColors[3];
  varying vec3 vColor;varying float vNodeType;varying vec3 vPosition;varying float vPulseIntensity;varying float vDistanceFromRoot;varying float vGlow;
  void main(){
    vec2 c=2.0*gl_PointCoord-1.0;float d=length(c);if(d>1.0)discard;
    float g1=1.0-smoothstep(0.0,0.5,d);float g2=1.0-smoothstep(0.0,1.0,d);
    float gs=pow(g1,1.2)+g2*0.3;
    vec3 col=vColor*(0.9+0.1*sin(uTime*0.6+vDistanceFromRoot*0.25));
    if(vPulseIntensity>0.0){col=mix(col,mix(vec3(1.0),uPulseColors[0],0.4),vPulseIntensity*0.8);col*=(1.0+vPulseIntensity*1.2);gs*=(1.0+vPulseIntensity);}
    col+=vec3(1.0)*smoothstep(0.4,0.0,d)*0.3;
    float a=gs*(0.95-0.3*d)*smoothstep(100.0,15.0,length(vPosition-cameraPosition));
    col*=(1.0+vGlow*0.1);gl_FragColor=vec4(col,a);
  }`;

const connVert = `${noiseFn}
  attribute vec3 startPoint;attribute vec3 endPoint;attribute float connectionStrength;attribute float pathIndex;attribute vec3 connectionColor;
  uniform float uTime;uniform vec3 uPulsePositions[3];uniform float uPulseTimes[3];uniform float uPulseSpeed;
  varying vec3 vColor;varying float vCS;varying float vPI;varying float vPP;varying float vDFC;
  float getPulse(vec3 wp,vec3 pp,float pt){
    if(pt<0.0)return 0.0;float ts=uTime-pt;if(ts<0.0||ts>4.0)return 0.0;
    float pr=ts*uPulseSpeed;float d=distance(wp,pp);
    return smoothstep(3.0,0.0,abs(d-pr))*smoothstep(4.0,0.0,ts);
  }
  void main(){
    float t=position.x;vPP=t;
    vec3 mid=mix(startPoint,endPoint,0.5);
    vec3 perp=normalize(cross(normalize(endPoint-startPoint),vec3(0,1,0)));
    if(length(perp)<0.1)perp=vec3(1,0,0);
    mid+=perp*sin(t*3.14159)*0.15;
    vec3 p0=mix(startPoint,mid,t);vec3 p1=mix(mid,endPoint,t);vec3 fp=mix(p0,p1,t);
    fp+=perp*snoise(vec3(pathIndex*0.08,t*0.6,uTime*0.15))*0.12;
    vec3 wp=(modelMatrix*vec4(fp,1.0)).xyz;
    float pi=0.0;for(int i=0;i<3;i++)pi+=getPulse(wp,uPulsePositions[i],uPulseTimes[i]);
    vPI=min(pi,1.0);vColor=connectionColor;vCS=connectionStrength;vDFC=length(wp-cameraPosition);
    gl_Position=projectionMatrix*modelViewMatrix*vec4(fp,1.0);
  }`;

const connFrag = `
  uniform float uTime;uniform vec3 uPulseColors[3];
  varying vec3 vColor;varying float vCS;varying float vPI;varying float vPP;varying float vDFC;
  void main(){
    float f1=sin(vPP*25.0-uTime*4.0)*0.5+0.5;float f2=sin(vPP*15.0-uTime*2.5+1.57)*0.5+0.5;
    float cf=(f1+f2*0.5)/1.5;
    vec3 col=vColor*(0.8+0.2*sin(uTime*0.6+vPP*12.0));
    float fi=0.4*cf*vCS;
    if(vPI>0.0){col=mix(col,mix(vec3(1.0),uPulseColors[0],0.3)*1.2,vPI*0.7);fi+=vPI*0.8;}
    col*=(0.7+fi+vCS*0.5);
    float a=(0.7*vCS+cf*0.3)*smoothstep(100.0,15.0,vDFC);
    a=mix(a,min(1.0,a*2.5),vPI);
    gl_FragColor=vec4(col,a);
  }`;

// ── Node class ────────────────────────────────────────────────────────────────
class Node {
  constructor(pos, level=0, type=0) {
    this.position=pos; this.connections=[]; this.level=level; this.type=type;
    this.size=type===0?THREE.MathUtils.randFloat(0.8,1.4):THREE.MathUtils.randFloat(0.5,1.0);
    this.distanceFromRoot=0;
  }
  addConnection(node, strength=1.0) {
    if(!this.isConnectedTo(node)){
      this.connections.push({node,strength});
      node.connections.push({node:this,strength});
    }
  }
  isConnectedTo(node){ return this.connections.some(c=>c.node===node); }
}

// ── Formations ────────────────────────────────────────────────────────────────
function generateNetwork(formation) {
  let nodes=[], rootNode;

  function sphere() {
    rootNode=new Node(new THREE.Vector3(0,0,0),0,0); rootNode.size=2.0; nodes.push(rootNode);
    const gr=(1+Math.sqrt(5))/2;
    for(let layer=1;layer<=5;layer++){
      const r=layer*4, n=Math.floor(layer*12);
      for(let i=0;i<n;i++){
        const phi=Math.acos(1-2*(i+0.5)/n), theta=2*Math.PI*i/gr;
        const pos=new THREE.Vector3(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi));
        const node=new Node(pos,layer,layer===5||Math.random()<0.3?1:0);
        node.distanceFromRoot=r; nodes.push(node);
        if(layer>1){
          const prev=nodes.filter(n=>n.level===layer-1&&n!==rootNode).sort((a,b)=>pos.distanceTo(a.position)-pos.distanceTo(b.position));
          for(let j=0;j<Math.min(3,prev.length);j++) node.addConnection(prev[j],Math.max(0.3,1-(pos.distanceTo(prev[j].position)/(r*2))));
        } else rootNode.addConnection(node,0.9);
      }
      const ln=nodes.filter(n=>n.level===layer&&n!==rootNode);
      for(let i=0;i<ln.length;i++){
        const node=ln[i];
        ln.filter(n=>n!==node).sort((a,b)=>node.position.distanceTo(a.position)-node.position.distanceTo(b.position)).slice(0,5).forEach(nn=>{
          if(node.position.distanceTo(nn.position)<r*0.8&&!node.isConnectedTo(nn)) node.addConnection(nn,0.6);
        });
      }
    }
    const outer=nodes.filter(n=>n.level>=3);
    for(let i=0;i<20;i++){
      const n1=outer[Math.floor(Math.random()*outer.length)],n2=outer[Math.floor(Math.random()*outer.length)];
      if(n1!==n2&&!n1.isConnectedTo(n2)&&Math.abs(n1.level-n2.level)>1) n1.addConnection(n2,0.4);
    }
  }

  function helix() {
    rootNode=new Node(new THREE.Vector3(0,0,0),0,0); rootNode.size=1.8; nodes.push(rootNode);
    const helices=[], H=4, nph=50;
    for(let h=0;h<H;h++){
      const phase=(h/H)*Math.PI*2, hn=[];
      for(let i=0;i<nph;i++){
        const t=i/(nph-1), y=(t-0.5)*30, rs=Math.sin(t*Math.PI)*0.7+0.3, r=12*rs, a=phase+t*Math.PI*6;
        const node=new Node(new THREE.Vector3(r*Math.cos(a),y,r*Math.sin(a)),Math.ceil(t*5),i>nph-5||Math.random()<0.25?1:0);
        node.distanceFromRoot=Math.sqrt(r*r+y*y); nodes.push(node); hn.push(node);
      }
      helices.push(hn); rootNode.addConnection(hn[0],1.0);
      for(let i=0;i<hn.length-1;i++) hn[i].addConnection(hn[i+1],0.85);
    }
    for(let h=0;h<H;h++){
      const cur=helices[h],nxt=helices[(h+1)%H];
      for(let i=0;i<cur.length;i+=5){
        const ti=Math.round(cur[i].helixT*(nxt.length-1));
        if(ti<nxt.length) cur[i].addConnection(nxt[ti],0.7);
      }
    }
  }

  function fractal() {
    rootNode=new Node(new THREE.Vector3(0,0,0),0,0); rootNode.size=1.6; nodes.push(rootNode);
    function branch(start,dir,depth,str,scale){
      if(depth>4)return;
      const ep=new THREE.Vector3().copy(start.position).add(dir.clone().multiplyScalar(5*scale));
      const node=new Node(ep,depth,depth===4||Math.random()<0.3?1:0);
      node.distanceFromRoot=rootNode.position.distanceTo(ep); nodes.push(node); start.addConnection(node,str);
      if(depth<4){
        for(let i=0;i<3;i++){
          const a=(i/3)*Math.PI*2, p1=new THREE.Vector3(-dir.y,dir.x,0).normalize(), p2=dir.clone().cross(p1).normalize();
          branch(node,new THREE.Vector3().copy(dir).add(p1.clone().multiplyScalar(Math.cos(a)*0.7)).add(p2.clone().multiplyScalar(Math.sin(a)*0.7)).normalize(),depth+1,str*0.7,scale*0.75);
        }
      }
    }
    for(let i=0;i<6;i++){
      const phi=Math.acos(1-2*(i+0.5)/6),theta=Math.PI*(1+Math.sqrt(5))*i;
      branch(rootNode,new THREE.Vector3(Math.sin(phi)*Math.cos(theta),Math.sin(phi)*Math.sin(theta),Math.cos(phi)).normalize(),1,0.9,1.0);
    }
  }

  [sphere,helix,fractal][formation%3]();
  return {nodes,rootNode};
}

// ── Build Three.js geometry from network ─────────────────────────────────────
let nodesMesh=null, connMesh=null;

function build(formation) {
  if(nodesMesh){scene.remove(nodesMesh);nodesMesh.geometry.dispose();nodesMesh.material.dispose();}
  if(connMesh){scene.remove(connMesh);connMesh.geometry.dispose();connMesh.material.dispose();}

  const net=generateNetwork(formation);
  const palette=colorPalettes[activePalette];

  const np=[], nt=[], ns=[], nc=[], ndf=[];
  net.nodes.forEach(node=>{
    np.push(node.position.x,node.position.y,node.position.z);
    nt.push(node.type); ns.push(node.size); ndf.push(node.distanceFromRoot);
    const c=palette[Math.min(node.level,palette.length-1)].clone();
    c.offsetHSL(THREE.MathUtils.randFloatSpread(0.03),THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08));
    nc.push(c.r,c.g,c.b);
  });
  const ng=new THREE.BufferGeometry();
  ng.setAttribute('position',        new THREE.Float32BufferAttribute(np,3));
  ng.setAttribute('nodeType',        new THREE.Float32BufferAttribute(nt,1));
  ng.setAttribute('nodeSize',        new THREE.Float32BufferAttribute(ns,1));
  ng.setAttribute('nodeColor',       new THREE.Float32BufferAttribute(nc,3));
  ng.setAttribute('distanceFromRoot',new THREE.Float32BufferAttribute(ndf,1));
  const nm=new THREE.ShaderMaterial({uniforms:THREE.UniformsUtils.clone(pulseUniforms),vertexShader:nodeVert,fragmentShader:nodeFrag,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  nodesMesh=new THREE.Points(ng,nm); scene.add(nodesMesh);

  const cp=[], cs=[], cpos=[], sp=[], ep=[], pi=[];
  const seen=new Set(); let pidx=0;
  net.nodes.forEach((node,ni)=>{
    node.connections.forEach(conn=>{
      const ci=net.nodes.indexOf(conn.node);
      if(ci===-1)return;
      const key=[Math.min(ni,ci),Math.max(ni,ci)].join('-');
      if(!seen.has(key)){
        seen.add(key);
        for(let i=0;i<20;i++){
          cpos.push(i/19,0,0);
          sp.push(node.position.x,node.position.y,node.position.z);
          ep.push(conn.node.position.x,conn.node.position.y,conn.node.position.z);
          pi.push(pidx); cs.push(conn.strength);
          const cl=palette[Math.min(Math.floor((node.level+conn.node.level)/2),palette.length-1)].clone();
          cl.offsetHSL(THREE.MathUtils.randFloatSpread(0.03),THREE.MathUtils.randFloatSpread(0.08),THREE.MathUtils.randFloatSpread(0.08));
          cp.push(cl.r,cl.g,cl.b);
        }
        pidx++;
      }
    });
  });
  const cg=new THREE.BufferGeometry();
  cg.setAttribute('position',        new THREE.Float32BufferAttribute(cpos,3));
  cg.setAttribute('startPoint',      new THREE.Float32BufferAttribute(sp,3));
  cg.setAttribute('endPoint',        new THREE.Float32BufferAttribute(ep,3));
  cg.setAttribute('connectionStrength',new THREE.Float32BufferAttribute(cs,1));
  cg.setAttribute('connectionColor', new THREE.Float32BufferAttribute(cp,3));
  cg.setAttribute('pathIndex',       new THREE.Float32BufferAttribute(pi,1));
  const cm=new THREE.ShaderMaterial({uniforms:THREE.UniformsUtils.clone(pulseUniforms),vertexShader:connVert,fragmentShader:connFrag,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  connMesh=new THREE.LineSegments(cg,cm); scene.add(connMesh);

  palette.slice(0,3).forEach((col,i)=>{nm.uniforms.uPulseColors.value[i].copy(col);cm.uniforms.uPulseColors.value[i].copy(col);});
}

// ── Auto-morph every 30s ──────────────────────────────────────────────────────
setInterval(()=>{ currentFormation=(currentFormation+1)%3; build(currentFormation); }, 30000);

// ── Animate ───────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(nodesMesh){nodesMesh.material.uniforms.uTime.value=t;nodesMesh.rotation.y=Math.sin(t*0.04)*0.05;}
  if(connMesh){connMesh.material.uniforms.uTime.value=t;connMesh.rotation.y=Math.sin(t*0.04)*0.05;}
  starField.rotation.y+=0.0002;
  starField.material.uniforms.uTime.value=t;
  controls.update();
  composer.render();
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer.setSize(window.innerWidth,window.innerHeight);
});

build(currentFormation);
animate();
</script>
